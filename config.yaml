# College athletics viewership model configuration

# Sports included in training and predictions
sports:
  - football
  - mens_basketball
  - womens_basketball
  - softball
  - baseball

sport: all  # legacy single-sport filter; ignored when sports list is set

paths:
  arizona_workbook: data/Arizona Jersey Patch Valuation .xlsx
  njit_workbook: data/NJIT Jersey Patch Valuation 2024-25.xlsx
  monmouth_workbook: data/Monmouth Jersey Patch Valuation.xlsx
  valuation_workbooks:
    - file: data/Arizona Jersey Patch Valuation .xlsx
      home_team: Arizona
      sheets: ["Valuation (24-25 Data)"]
      prefix: AZ
      conference: Big 12
      city: Tucson
      state: AZ
    - file: data/NJIT Jersey Patch Valuation 2024-25.xlsx
      home_team: NJIT
      sheets: ["NJIT Jersey Patch Valuation"]
      prefix: NJ
      conference: America East
      city: Newark
      state: NJ
    - file: data/Monmouth Jersey Patch Valuation.xlsx
      home_team: Monmouth
      format: monmouth_schedule
      sheets:
        - MBB Schedule 2024-2025
        - MBB Schedule 2025-26
        - WBB Schedule 2024-25
        - WBB Schedule 2025-26
        - Baseball Schedule 2024-2025
        - Football Schedule 2024
        - Football Schedule 2025
      prefix: MU
      conference: CAA
      city: West Long Branch
      state: NJ
  games: data/games.csv
  teams: data/teams.csv
  networks: data/networks.csv
  team_overrides: data/team_overrides.csv
  team_rankings: data/team_rankings.csv
  school_enrollment: data/school_enrollment.csv
  network_overrides: data/network_overrides.csv
  research_games: data/research/games.csv
  research_benchmarks: data/research/viewership_benchmarks.csv
  model_dir: artifacts
  model_file: viewership_model.joblib
  scoring_model: scoring_model.joblib

target:
  column: viewership_millions

scoring:
  team_power: 1.0
  # Exponent on network reach; >1 amplifies cable (FS1) vs streaming (ESPN+) more strongly.
  network_power: 2.25
  # Weight on the higher-popularity team when combining home + away (0.5 = average, 1.0 = max only).
  star_weight: 0.65

model:
  test_size: 0.2
  random_state: 42

training:
  game_types:
    - regular_season
  # Train on schedule-tier games; marquee article outliers are downweighted heavily.
  calibration_tiers:
    - typical
  weights:
    spreadsheet: 1.0
    research_typical: 0.45
    research_marquee: 0.08
    estimate: 0.35

features:
  categorical:
    - sport
    - home_team
    - away_team
    - network
    - conference
    - location_type
  numeric:
    - home_popularity
    - away_popularity
    - combined_popularity
    - network_reach
    - is_rivalry
    - is_ranked_matchup
    - is_prime_time
    - week_of_season
    - home_market_size
    - neutral_site
